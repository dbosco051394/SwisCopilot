trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - task: Bash@3
    displayName: Build app image
    inputs:
      targetType: inline
      script: |
        docker build -t myapp:$(Build.SourceVersion) .

  - task: Bash@3
    displayName: Run Swis
    inputs:
      targetType: inline
      script: |
        docker run --rm \
          -v "$(System.DefaultWorkingDirectory):/workspace" -w /workspace \
          docker.io/dbosco051394/swis:latest \
          SWIS_TOOL=all \
          SWIS_PROFILE=strict \
          SWIS_OUTPUT=sarif \
          SWIS_IMAGE=myapp:$(Build.SourceVersion) \
          SWIS_IAC_PATH=/workspace/iac
