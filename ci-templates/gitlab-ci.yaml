stages:
  - build
  - scan

variables:
  APP_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

build:
  stage: build
  image: docker:latest
  services: [docker:dind]
  script:
    - docker build -t "$APP_IMAGE" .
    - docker push "$APP_IMAGE"

swis_scan:
  stage: scan
  image: docker.io/dbosco051394/swis:latest
  services: [docker:dind]
  script:
    - docker pull "$APP_IMAGE"
    - SWIS_TOOL=all \
      SWIS_PROFILE=balanced \
      SWIS_OUTPUT=json \
      SWIS_IMAGE="$APP_IMAGE" \
      SWIS_IAC_PATH=/workspace/iac \
      swis
