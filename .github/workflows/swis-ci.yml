name: Swis CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip

      - name: Install dependencies
        run: pip3 install pytest rich pyyaml

      - name: Print Working Directory
        run: pwd

      - name: Run unit tests
        run: python -m pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "dbosco051394" --password-stdin

      - name: Build Swis
        run: |
          docker build -t dbosco051394/swis:${{ github.ref_name }} .
          docker tag dbosco051394/swis:${{ github.ref_name }} dbosco051394/swis:latest

      - name: Push Swis
        run: |
          docker push dbosco051394/swis:${{ github.ref_name }}
          docker push dbosco051394/swis:latest
